x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    image: ghcr.io/goddamnman/kafekafe-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      MENU_FILE: /app/data/menu_seed.json
    expose:
      - "8000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: "0.50"
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/goddamnman/kafekafe-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    mem_limit: 128m
    cpus: "0.50"
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
