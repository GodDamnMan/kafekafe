server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/javascript application/json image/svg+xml text/css text/plain;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ~ ^/api/image/(?<image_id>[0-9]+)$ {
        if ($http_accept ~* "image/webp") {
            rewrite ^ /__menu_webp/$image_id/image.webp last;
        }

        rewrite ^ /__menu_png/$image_id/image.png last;
    }

    location /__menu_webp/ {
        internal;
        alias /usr/share/nginx/menu-images-optimized/;
        types {
            image/webp webp;
        }
        default_type image/webp;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header Vary Accept always;
    }

    location /__menu_png/ {
        internal;
        alias /usr/share/nginx/menu-images/;
        types {
            image/png png;
        }
        default_type image/png;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header Vary Accept always;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
