x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    environment:
      MENU_FILE: /app/data/menu_seed.json
    volumes:
      - ./data:/app/data:ro
    expose:
      - "8000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./images:/usr/share/nginx/menu-images:ro
      - ./images_optimized:/usr/share/nginx/menu-images-optimized:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
